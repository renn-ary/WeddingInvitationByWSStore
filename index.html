<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#ff7d26" />
    <!-- Open Graph (WA, Facebook, dll) -->
    <meta
      property="og:title"
      content="Undangan Pernikahan Suliswanto & Kosidah"
    />
    <meta
      property="og:description"
      content="Kami mengundang Anda untuk hadir di hari bahagia kami."
    />
    <meta
      property="og:image"
      content="https://wedding.rendiasyari.workers.dev/assets/images/ogimage.jpg?v=2"
    />

    <meta
      property="og:url"
      content="https://wedding.rendiasyari.workers.dev/"
    />
    <meta property="og:type" content="website" />

    <!-- Tambahan biar lebih optimal -->
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <script src="https://unpkg.com/@lottiefiles/lottie-player@latest/dist/lottie-player.js"></script>

    <link rel="icon" href="assets/images/ikonwsweb.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&family=Tangerine:wght@400;700&display=swap"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
    />

    <!-- AOS CSS -->
    <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet" />

    <title>Wedding Suliswanto & Kosidah | By WS Store</title>

    <link rel="stylesheet" href="assets/css/style.css" />
  </head>

  <body>
    <div id="loader">
      <lottie-player
        src="/assets/lottie/loading.json"
        background="transparent"
        speed="1"
        style="width: 200px; height: 200px"
        loop
        autoplay
      >
      </lottie-player>
    </div>

    <audio id="music" loop>
      <source src="assets/music/music.mp3" />
    </audio>

    <div id="app"></div>

    <script src="controllers/invitationController.js"></script>
    <script src="router/router.js"></script>
    <script src="assets/js/countdown.js"></script>
    <script src="script.js"></script>
    <script src="assets/js/music.js"></script>
    <!-- AOS JS -->
    <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
    <script>
      AOS.init({
        duration: 1000, // durasi animasi dalam ms
        once: true, // animasi cuma jalan sekali
      });
    </script>
  </body>
</html>
